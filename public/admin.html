<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Admin</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --preto: #080808;
      --carvao: #0f0f12;
      --grafite: #18181f;
      --borda: #28282f;
      --roxo: #7b2fbe;
      --roxo-vivo: #9b3fde;
      --roxo-claro: #b566e8;
      --offwhite: #f2ede4;
      --offwhite-dim: #c8c2b8;
      --cinza: #6a6575;
      --cinza-medio: #3a3545;
      --fonte-titulo: "Raleway", sans-serif;
      --fonte-corpo: "Inter", sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--preto); color: var(--offwhite); font-family: var(--fonte-corpo); min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--preto);
    }
    .login-card {
      background: var(--grafite);
      border: 1px solid var(--borda);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      font-family: var(--fonte-titulo);
      font-weight: 800;
      font-size: 1.9rem;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-logo .nex { color: var(--offwhite); }
    .login-logo .us { color: var(--roxo-vivo); }
    .login-subtitle { text-align: center; color: var(--cinza); font-size: 0.82rem; margin-bottom: 34px; letter-spacing: 1px; text-transform: uppercase; }
    .login-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--cinza); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
    .login-input {
      width: 100%;
      padding: 13px 15px;
      background: var(--carvao);
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--offwhite);
      font-family: var(--fonte-corpo);
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus { border-color: var(--roxo); box-shadow: 0 0 0 3px rgba(123,47,190,0.12); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--roxo);
      color: var(--offwhite);
      border: none;
      border-radius: 8px;
      font-family: var(--fonte-titulo);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .login-btn:hover { background: var(--roxo-vivo); transform: translateY(-2px); }
    .login-error { color: #ffb4b4; font-size: 0.8rem; text-align: center; margin-top: 12px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    header {
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--borda);
      padding: 15px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { font-family: var(--fonte-titulo); font-weight: 800; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .header-logo .nex { color: var(--offwhite); }
    .header-logo .us { color: var(--roxo-vivo); }
    .header-badge {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--roxo-claro);
      background: rgba(123,47,190,0.12);
      border: 1px solid rgba(123,47,190,0.25);
      padding: 3px 9px;
      border-radius: 100px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .btn-export {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: rgba(123,47,190,0.1);
      border: 1px solid rgba(123,47,190,0.3);
      color: var(--roxo-claro);
      border-radius: 7px;
      font-family: var(--fonte-titulo);
      font-weight: 700;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-export:hover { background: rgba(123,47,190,0.2); border-color: var(--roxo-claro); }
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid var(--borda);
      color: var(--cinza);
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-refresh:hover { border-color: var(--roxo-claro); color: var(--roxo-claro); }
    .btn-logout {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid var(--borda);
      color: var(--cinza);
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }

    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: var(--grafite);
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(123,47,190,0.4); }
    .stat-icon {
      width: 46px; height: 46px;
      background: rgba(123,47,190,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--roxo-claro); font-size: 1.15rem; flex-shrink: 0;
    }
    .stat-value { font-family: var(--fonte-titulo); font-size: 2rem; font-weight: 800; line-height: 1; color: var(--offwhite); }
    .stat-label { font-size: 0.72rem; color: var(--cinza); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .filters-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--cinza); font-size: 0.82rem; pointer-events: none; }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--grafite);
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--offwhite);
      font-family: var(--fonte-corpo);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--roxo); }
    .search-input::placeholder { color: var(--cinza); }
    .filter-select {
      padding: 10px 14px;
      background: var(--grafite);
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--offwhite);
      font-family: var(--fonte-corpo);
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--roxo); }
    .filter-select option { background: var(--carvao); }

    .table-wrap { background: var(--grafite); border: 1px solid var(--borda); border-radius: 16px; overflow: hidden; }
    .table-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--borda);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-title { font-family: var(--fonte-titulo); font-weight: 700; font-size: 0.93rem; }
    .table-count { font-size: 0.75rem; color: var(--cinza); }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 16px;
      text-align: left;
      font-size: 0.66rem;
      font-weight: 600;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 1px;
      background: var(--carvao);
      border-bottom: 1px solid var(--borda);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid rgba(40,40,47,0.6); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(123,47,190,0.04); }
    tbody td { padding: 13px 16px; font-size: 0.85rem; color: var(--offwhite-dim); white-space: nowrap; }
    tbody td.col-nome { color: var(--offwhite); font-weight: 500; }
    tbody td.col-data { color: var(--cinza); font-size: 0.8rem; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(123,47,190,0.12);
      border: 1px solid rgba(123,47,190,0.25);
      color: var(--roxo-claro);
    }
    .wa-link {
      color: #4ade80;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.83rem;
      transition: opacity 0.2s;
    }
    .wa-link:hover { opacity: 0.75; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--cinza); }
    .empty-state i { font-size: 2.2rem; display: block; margin-bottom: 14px; color: var(--cinza-medio); }
    .loading { text-align: center; padding: 60px; color: var(--cinza); }

    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      main { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr; }
      .header-badge { display: none; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><span class="nex">NEX</span><span class="us">us</span></div>
    <p class="login-subtitle">Painel de Leads</p>
    <label class="login-label" for="senha">Senha de acesso</label>
    <input class="login-input" type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    <button class="login-btn" id="login-btn">
      <i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Entrar
    </button>
    <p class="login-error" id="login-error">Senha incorreta. Tente novamente.</p>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="header-logo">
      <span><span class="nex">NEX</span><span class="us">us</span></span>
      <span class="header-badge">Admin</span>
    </div>
    <div class="header-actions">
      <button class="btn-refresh" onclick="loadLeads()" title="Atualizar">
        <i class="fas fa-sync-alt"></i>
      </button>
      <button class="btn-export" onclick="exportCSV()">
        <i class="fas fa-download"></i> Exportar CSV
      </button>
      <button class="btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
    </div>
  </header>
  <main>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total de Leads</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
        <div>
          <div class="stat-value" id="stat-hoje">—</div>
          <div class="stat-label">Leads Hoje</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-calendar-week"></i></div>
        <div>
          <div class="stat-value" id="stat-semana">—</div>
          <div class="stat-label">Últimos 7 dias</div>
        </div>
      </div>
    </div>

    <div class="filters-bar">
      <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input class="search-input" type="text" id="search" placeholder="Buscar por nome, e-mail, restaurante..." oninput="renderTable()" />
      </div>
      <select class="filter-select" id="filter-segmento" onchange="renderTable()">
        <option value="">Todos os segmentos</option>
      </select>
      <select class="filter-select" id="filter-faturamento" onchange="renderTable()">
        <option value="">Todos os faturamentos</option>
      </select>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Leads</span>
        <span class="table-count" id="table-count">carregando...</span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Nome</th>
              <th>WhatsApp</th>
              <th>E-mail</th>
              <th>Restaurante</th>
              <th>Segmento</th>
              <th>Faturamento</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" class="loading"><i class="fas fa-spinner fa-spin"></i></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
let allLeads = [];
let token = "";

function login() {
  const senha = document.getElementById("senha").value.trim();
  if (!senha) return;
  const btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Entrando...';

  fetch("/api/admin/leads", { headers: { "Authorization": "Bearer " + senha } })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        token = senha;
        sessionStorage.setItem("admin_token", senha);
        allLeads = data.leads;
        showDashboard();
      } else {
        document.getElementById("login-error").style.display = "block";
      }
    })
    .catch(() => {
      document.getElementById("login-error").textContent = "Erro de conexão. Tente novamente.";
      document.getElementById("login-error").style.display = "block";
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Entrar';
    });
}

function logout() {
  sessionStorage.removeItem("admin_token");
  token = "";
  allLeads = [];
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("senha").value = "";
  document.getElementById("login-error").style.display = "none";
}

function showDashboard() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  updateStats();
  populateFilters();
  renderTable();
}

function loadLeads() {
  if (!token) return;
  const btn = document.querySelector(".btn-refresh i");
  btn.classList.add("fa-spin");
  fetch("/api/admin/leads", { headers: { "Authorization": "Bearer " + token } })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        allLeads = data.leads;
        updateStats();
        renderTable();
      }
    })
    .catch(() => {})
    .finally(() => btn.classList.remove("fa-spin"));
}

function updateStats() {
  const now = new Date();
  const hoje = now.toISOString().slice(0, 10);
  const semanaAtras = new Date(now - 7 * 86400000).toISOString().slice(0, 10);
  document.getElementById("stat-total").textContent = allLeads.length;
  document.getElementById("stat-hoje").textContent = allLeads.filter(l => l.createdAt && l.createdAt.slice(0, 10) === hoje).length;
  document.getElementById("stat-semana").textContent = allLeads.filter(l => l.createdAt && l.createdAt.slice(0, 10) >= semanaAtras).length;
}

function populateFilters() {
  const segSel = document.getElementById("filter-segmento");
  const fatSel = document.getElementById("filter-faturamento");
  segSel.innerHTML = '<option value="">Todos os segmentos</option>';
  fatSel.innerHTML = '<option value="">Todos os faturamentos</option>';

  [...new Set(allLeads.map(l => l.segmento).filter(Boolean))].sort().forEach(s => {
    segSel.appendChild(Object.assign(document.createElement("option"), { value: s, textContent: s }));
  });
  [...new Set(allLeads.map(l => l.faturamento).filter(Boolean))].forEach(f => {
    fatSel.appendChild(Object.assign(document.createElement("option"), { value: f, textContent: f }));
  });
}

function renderTable() {
  const search = document.getElementById("search").value.toLowerCase();
  const segmento = document.getElementById("filter-segmento").value;
  const faturamento = document.getElementById("filter-faturamento").value;

  const filtered = allLeads.filter(l => {
    const matchSearch = !search || [l.nome, l.email, l.empresa, l.telefone].some(v => v && v.toLowerCase().includes(search));
    return matchSearch && (!segmento || l.segmento === segmento) && (!faturamento || l.faturamento === faturamento);
  });

  document.getElementById("table-count").textContent = filtered.length + " lead" + (filtered.length !== 1 ? "s" : "");

  const tbody = document.getElementById("table-body");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i>Nenhum lead encontrado</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(l => {
    const tel = (l.telefone || "").replace(/\D/g, "");
    const waLink = tel
      ? `<a class="wa-link" href="https://wa.me/55${tel}" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i>${esc(l.telefone)}</a>`
      : esc(l.telefone) || "—";
    return `<tr>
      <td class="col-data">${fmtDate(l.createdAt)}</td>
      <td class="col-nome">${esc(l.nome)}</td>
      <td>${waLink}</td>
      <td>${esc(l.email)}</td>
      <td>${esc(l.empresa)}</td>
      <td><span class="badge">${esc(l.segmento)}</span></td>
      <td>${esc(l.faturamento)}</td>
    </tr>`;
  }).join("");
}

function fmtDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("pt-BR") + " " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  } catch { return iso; }
}

function esc(str) {
  if (!str) return "—";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function exportCSV() {
  const cols = ["Data","Nome","Telefone","Email","Restaurante","Segmento","Faturamento"];
  const rows = allLeads.map(l => [
    l.createdAt ? new Date(l.createdAt).toLocaleString("pt-BR") : "",
    l.nome, l.telefone, l.email, l.empresa, l.segmento, l.faturamento
  ].map(v => `"${(v || "").replace(/"/g, '""')}"`).join(","));

  const csv = [cols.join(","), ...rows].join("\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob),
    download: "leads-nexus-" + new Date().toISOString().slice(0,10) + ".csv"
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById("senha").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
document.getElementById("login-btn").addEventListener("click", login);

const saved = sessionStorage.getItem("admin_token");
if (saved) {
  fetch("/api/admin/leads", { headers: { "Authorization": "Bearer " + saved } })
    .then(r => r.json())
    .then(data => { if (data.ok) { token = saved; allLeads = data.leads; showDashboard(); } })
    .catch(() => {});
}

setInterval(loadLeads, 30000);
</script>
</body>
</html>
