<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obrigado — Nexus Assessoria</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .thanks-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
      }
      .thanks-glow {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 400px;
        background: radial-gradient(ellipse, rgba(123, 47, 190, 0.2) 0%, transparent 70%);
        pointer-events: none;
      }
      .thanks-card {
        background: var(--grafite);
        border: 1px solid var(--borda);
        border-radius: 24px;
        padding: 56px 48px;
        max-width: 540px;
        width: 100%;
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .thanks-icon {
        width: 80px;
        height: 80px;
        background: rgba(123, 47, 190, 0.12);
        border: 1px solid rgba(123, 47, 190, 0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--roxo-claro);
        margin: 0 auto 28px;
      }
      .thanks-card h1 {
        font-family: var(--fonte-titulo);
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 800;
        letter-spacing: -1px;
        line-height: 1.15;
        margin-bottom: 18px;
      }
      .thanks-card h1 em {
        font-style: normal;
        background: linear-gradient(135deg, var(--roxo-vivo), var(--roxo-claro));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .thanks-card p {
        font-size: 1rem;
        color: var(--offwhite-dim);
        font-weight: 300;
        line-height: 1.75;
        margin-bottom: 36px;
      }
      .thanks-timer {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(123, 47, 190, 0.1);
        border: 1px solid rgba(123, 47, 190, 0.25);
        color: var(--roxo-claro);
        padding: 10px 20px;
        border-radius: 100px;
        font-size: 0.82rem;
        font-weight: 500;
        margin-bottom: 32px;
      }
      .thanks-logo {
        margin: 0 auto 32px;
        display: flex;
        justify-content: center;
      }
      .thanks-back {
        display: block;
        margin-top: 20px;
        font-size: 0.82rem;
        color: var(--cinza);
        text-decoration: none;
        transition: color 0.2s;
      }
      .thanks-back:hover { color: var(--roxo-claro); }
      @media (max-width: 600px) {
        .thanks-card { padding: 36px 24px; }
      }
    </style>
  </head>
  <body>
    <section class="thanks-page">
      <div class="thanks-glow"></div>
      <div class="thanks-card">
        <div class="thanks-logo">
          <img src="/logo-nexus.png" alt="Nexus" height="36" />
        </div>
        <div class="thanks-icon">
          <i class="fas fa-check"></i>
        </div>
        <h1>Parabéns por tomar<br /><em>essa decisão!</em></h1>
        <p>
          Você acaba de dar o primeiro passo para transformar o marketing do seu restaurante em resultados reais.
        </p>
        <div class="thanks-timer">
          <i class="fas fa-clock"></i>
          Em até 5 minutos entraremos em contato
        </div>
      </div>
    </section>
  </body>
</html>
